name: Orchestrate (Stage-2 Sense loop)

# Stage-2 runner. Reads .claude/orchestration.json and does nothing unless `mode`
# is `scheduled` or `event-driven` AND `paused` is false (the guard job exits early
# otherwise). When active it runs scripts/orchestrate.mjs: the read-only sentinels
# scan `main` and the runner files idempotent issues (capped by max_prs_per_run),
# then routes the `priority` queue. Sentinels never edit code, never merge, never
# close; building a priority issue into a PR is a separate coding-agent step and a
# human always merges. See docs/decisions/0002-stage3-autonomy-model.md.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this manual run"
        required: false
  schedule:
    # Daily, off-peak. Inert while mode=manual (the guard exits early).
    - cron: "17 6 * * *"
  # Event-driven (Stage 3): uncomment to fan out on new/labeled issues.
  # issues:
  #   types: [opened, labeled]

permissions:
  contents: read
  issues: read

concurrency:
  group: orchestrate
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
      mode: ${{ steps.decide.outputs.mode }}
    steps:
      - uses: actions/checkout@v4
      - id: decide
        shell: bash
        run: |
          cfg=.claude/orchestration.json
          mode=$(jq -r '.mode' "$cfg")
          paused=$(jq -r '.paused' "$cfg")
          echo "event=${{ github.event_name }} mode=$mode paused=$paused"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          if [ "$paused" = "true" ]; then
            echo "::notice::Orchestration paused — no-op."
            echo "run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          case "$mode" in
            scheduled|event-driven) echo "run=true"  >> "$GITHUB_OUTPUT" ;;
            *)                       echo "::notice::mode=$mode (manual) — no-op."
                                     echo "run=false" >> "$GITHUB_OUTPUT" ;;
          esac

  orchestrate:
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write  # the Sense loop files proposal/priority issues
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run the Sense loop (sentinels) + route the priority queue
        run: node scripts/orchestrate.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
