version: 2
updates:
  # npm dependencies — weekly, grouped to keep PR noise low.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      development:
        dependency-type: "development"
        update-types: ["minor", "patch"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    labels: ["dependencies"]

  # Keep the GitHub Actions in our workflows current too.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    labels: ["dependencies", "ci"]
